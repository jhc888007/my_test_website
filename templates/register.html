<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="has-noise">
  <div class="auth-page">
    <div class="auth-card">
      <h1>注册账号</h1>
      <p class="auth-hint">请选择角色并完成注册</p>
      <form id="form-register" class="form-stack">
        <div class="field">
          <label for="username">用户名</label>
          <input class="input" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input class="input" id="password" name="password" type="password" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="role">角色</label>
          <select class="input" id="role" name="role" required>
            <option value="A">A类用户（信托发放方）</option>
            <option value="B">B类用户（受益人）</option>
          </select>
        </div>
        <p id="reg-msg" class="msg-error" role="alert"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="width:100%">立即注册</button>
          <a class="link-muted" href="{{ url_for('login_page') }}">已有账号？去登录</a>
        </div>
      </form>
      <p class="hint-foot">演示系统，任意用户名均可注册</p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      window.TM.initRegister();
    });
  </script>
</body>
</html>
