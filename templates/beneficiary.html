{% extends "base.html" %}
{% block title %}受益人{% endblock %}
{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{% endblock %}
{% block body %}
<div class="min-h-screen p-6 md:p-10 max-w-4xl mx-auto">
  <header class="flex flex-wrap items-center justify-between gap-4 mb-10">
    <h1 class="text-3xl font-semibold text-gold">资产总览</h1>
    <a href="{{ url_for('logout') }}" class="text-sm text-[#E5E7EB] border border-[rgba(212,175,55,0.35)] rounded-md px-4 py-2 hover:bg-[rgba(212,175,55,0.1)]">退出</a>
  </header>

  <div class="text-center mb-10">
    <p class="text-sm text-[#E5E7EB] mb-2">信托总额</p>
    <p class="text-5xl md:text-6xl font-semibold text-gold tracking-tight">{{ "%.2f"|format(total_amount) }}</p>
  </div>

  <div class="glass-card p-4 md:p-6">
    <div id="vesting-chart" class="w-full h-[420px]"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  var labels = {{ chart_labels | tojson }};
  var values = {{ chart_values | tojson }};
  var el = document.getElementById('vesting-chart');
  var chart = echarts.init(el, 'dark');
  chart.setOption({
    backgroundColor: 'transparent',
    textStyle: { color: '#E5E7EB' },
    grid: { left: 48, right: 24, top: 48, bottom: 48 },
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(0,0,0,0.75)',
      borderColor: 'rgba(212,175,55,0.35)',
      textStyle: { color: '#E5E7EB' }
    },
    xAxis: {
      type: 'category',
      data: labels,
      axisLine: { lineStyle: { color: 'rgba(212,175,55,0.35)' } },
      axisLabel: { color: '#E5E7EB' }
    },
    yAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: 'rgba(212,175,55,0.12)' } },
      axisLabel: { color: '#E5E7EB' }
    },
    series: [{
      type: 'bar',
      data: values,
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#D4AF37' },
          { offset: 1, color: 'rgba(212,175,55,0.15)' }
        ])
      },
      emphasis: { itemStyle: { color: '#E8C547' } },
      barMaxWidth: 48
    }]
  });
  window.addEventListener('resize', function () { chart.resize(); });
</script>
{% endblock %}
