{% extends "layout_app.html" %}
{% block title %}用户审计 — Trust-Flow{% endblock %}
{% block content %}
<div class="anim-fade-in-up">
  <h2 class="text-2xl font-bold text-gold mb-2">用户审计</h2>
  <p class="text-body/70 text-sm mb-8">管理系统内全部注册用户。</p>
  <div class="glass overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead>
          <tr class="border-b border-gold-soft/40 text-gold/90">
            <th class="px-6 py-4 font-semibold">ID</th>
            <th class="px-6 py-4 font-semibold">用户名</th>
            <th class="px-6 py-4 font-semibold">角色</th>
            <th class="px-6 py-4 font-semibold">注册时间</th>
            <th class="px-6 py-4 font-semibold">操作</th>
          </tr>
        </thead>
        <tbody class="text-body divide-y divide-white/5">
          {% for u in users %}
          <tr class="hover:bg-white/[0.02]" data-user-id="{{ u.id }}">
            <td class="px-6 py-4">{{ u.id }}</td>
            <td class="px-6 py-4">{{ u.username }}</td>
            <td class="px-6 py-4">{{ u.role }}</td>
            <td class="px-6 py-4">{{ u.created_at }}</td>
            <td class="px-6 py-4">
              <button type="button" class="del-btn text-red-400 hover:text-red-300 text-xs font-semibold border border-red-500/40 rounded-lg px-3 py-1.5 hover:bg-red-500/10 transition" data-id="{{ u.id }}">注销账号</button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  <p id="audit-msg" class="mt-4 text-sm text-center text-body/60 hidden"></p>
</div>
<script>
(function(){
  const selfId = {{ session.user_id|tojson }};
  document.querySelectorAll('.del-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      const id = parseInt(btn.getAttribute('data-id'), 10);
      if (id === selfId) { alert('不能注销当前登录账号'); return; }
      if (!confirm('确定注销该账号？将级联删除其全部资金流转记录。')) return;
      fetch('/api/users/' + id, { method: 'DELETE', headers: { 'Accept': 'application/json' } })
        .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
        .then(function(res){
          const msg = document.getElementById('audit-msg');
          if (res.ok && res.j.ok) {
            var row = btn.closest('tr');
            if (row) row.remove();
            msg.textContent = '已注销';
            msg.classList.remove('hidden', 'text-red-400');
            msg.classList.add('text-emerald-400');
          } else {
            msg.textContent = (res.j && res.j.error) ? res.j.error : '操作失败';
            msg.classList.remove('hidden');
            msg.classList.add('text-red-400');
          }
        })
        .catch(function(){ alert('网络错误'); });
    });
  });
})();
</script>
{% endblock %}
