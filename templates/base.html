<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Trust-Flow 财富引擎{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .bg-lux {
      background: linear-gradient(135deg, #050505 0%, #001529 50%, #050505 100%);
      background-size: 200% 200%;
      animation: gradientShift 18s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .text-gold { color: #D4AF37; }
    .text-body { color: #E5E7EB; }
    .border-gold-soft { border-color: rgba(212, 175, 55, 0.15); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-in-up { animation: fadeInUp 0.55s ease-out both; }
    .anim-delay { animation-delay: 0.08s; }
    .nav-item:hover {
      background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.18) 0%, transparent 70%);
    }
    .nav-active {
      color: #D4AF37;
      border-left: 3px solid #D4AF37;
      box-shadow: inset 0 0 24px rgba(212, 175, 55, 0.08);
    }
    .badge-gold {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #D4AF37;
      border: 1px solid rgba(212, 175, 55, 0.45);
      background: rgba(212, 175, 55, 0.08);
    }
    .toast-enter { animation: fadeInUp 0.4s ease-out; }
    .glow-safe {
      color: #34d399;
      text-shadow: 0 0 12px rgba(52, 211, 153, 0.55);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-lux min-h-screen text-body">
  {% block body %}{% endblock %}
</body>
</html>
