{% extends "layout_app.html" %}
{% block title %}传承拓扑图 — Trust-Flow{% endblock %}
{% block content %}
<div class="anim-fade-in-up h-[calc(100vh-8rem)] min-h-[480px] flex flex-col">
  <h2 class="text-2xl font-bold text-gold mb-2">传承拓扑图</h2>
  <p class="text-body/70 text-sm mb-6">资金掌控全貌 · 管理人至受益人传承关系</p>
  <div class="glass flex-1 min-h-0 p-4">
    <div id="tree-chart" class="w-full h-full min-h-[420px]"></div>
  </div>
</div>
<script>
(function(){
  var data = {{ tree_data|tojson }};
  var el = document.getElementById('tree-chart');
  if (!el || typeof echarts === 'undefined') return;
  var chart = echarts.init(el, null, { renderer: 'canvas' });
  var option = {
    backgroundColor: 'transparent',
    tooltip: { trigger: 'item', triggerOn: 'mousemove' },
    series: [{
      type: 'tree',
      data: [data],
      top: '6%',
      left: '8%',
      bottom: '6%',
      right: '18%',
      symbolSize: 14,
      symbol: 'circle',
      itemStyle: {
        color: '#D4AF37',
        borderColor: 'rgba(212,175,55,0.9)',
        borderWidth: 2,
        shadowBlur: 18,
        shadowColor: 'rgba(212,175,55,0.55)'
      },
      label: {
        position: 'left',
        verticalAlign: 'middle',
        align: 'right',
        color: '#E5E7EB',
        fontWeight: 600
      },
      leaves: {
        label: { position: 'right', verticalAlign: 'middle', align: 'left', color: '#E5E7EB' }
      },
      emphasis: { focus: 'descendant' },
      expandAndCollapse: true,
      animationDuration: 550,
      animationDurationUpdate: 750,
      lineStyle: {
        color: 'rgba(212,175,55,0.55)',
        width: 2,
        curveness: 0.5
      },
      roam: true
    }]
  };
  chart.setOption(option);
  window.addEventListener('resize', function(){ chart.resize(); });
})();
</script>
{% endblock %}
