{% extends "base.html" %}
{% block body %}
<div class="flex min-h-screen anim-fade-in-up">
  <aside class="w-64 shrink-0 glass border-r border-gold-soft flex flex-col py-8 px-4">
    <div class="px-3 mb-10">
      <div class="text-gold font-bold text-lg tracking-tight">Trust-Flow</div>
      <div class="text-xs text-body/80 mt-1">财富引擎</div>
    </div>
    <nav class="flex-1 space-y-1">
      {% if session.role == 'TRUSTEE' %}
      <a href="{{ url_for('trustee_allocation') }}" class="nav-item block px-3 py-2.5 rounded-lg text-sm font-medium {% if request.endpoint == 'trustee_allocation' %}nav-active{% endif %}">资金划拨</a>
      <a href="{{ url_for('trustee_audit') }}" class="nav-item block px-3 py-2.5 rounded-lg text-sm font-medium {% if request.endpoint == 'trustee_audit' %}nav-active{% endif %}">用户审计</a>
      <a href="{{ url_for('trustee_tree') }}" class="nav-item block px-3 py-2.5 rounded-lg text-sm font-medium {% if request.endpoint == 'trustee_tree' %}nav-active{% endif %}">传承拓扑图</a>
      {% else %}
      <a href="{{ url_for('beneficiary_dashboard') }}" class="nav-item block px-3 py-2.5 rounded-lg text-sm font-medium {% if request.endpoint == 'beneficiary_dashboard' %}nav-active{% endif %}">我的资产看板</a>
      <a href="{{ url_for('beneficiary_macro') }}" class="nav-item block px-3 py-2.5 rounded-lg text-sm font-medium {% if request.endpoint == 'beneficiary_macro' %}nav-active{% endif %}">宏观研报</a>
      {% endif %}
    </nav>
    <div class="mt-auto pt-6 border-t border-gold-soft/30 px-2">
      <div class="text-xs text-body/70 mb-2 truncate" title="{{ session.username }}">{{ session.username }}</div>
      <form action="{{ url_for('logout') }}" method="post">
        <button type="submit" class="w-full py-2 rounded-lg text-sm font-semibold text-gold border border-[rgba(212,175,55,0.35)] hover:bg-[rgba(212,175,55,0.12)] transition">退出</button>
      </form>
    </div>
  </aside>
  <main class="flex-1 overflow-auto p-8 md:p-10">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
