<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="has-noise">
  <div class="auth-page">
    <div class="auth-card">
      <h1>登录</h1>
      <p class="auth-hint">请输入用户名与密码</p>
      <form id="form-login" class="form-stack">
        <div class="field">
          <label for="username">用户名</label>
          <input class="input" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <p id="login-msg" class="msg-error" role="alert"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
          <a class="link-muted" href="{{ url_for('register_page') }}">没有账号？去注册</a>
        </div>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      window.TM.initLogin();
    });
  </script>
</body>
</html>
