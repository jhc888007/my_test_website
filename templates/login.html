{% extends "base.html" %}
{% block title %}登录 · Trust Desk{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <div class="rounded-2xl border border-white/10 bg-white/[0.04] p-6 shadow-panel ring-1 ring-white/10 backdrop-blur-xl sm:p-8">
    <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-slate-500">Sign in</p>
    <h1 class="mt-2 text-xl font-semibold text-white">登录</h1>
    <p class="mt-1 text-sm text-slate-500">用户名与角色需与注册信息一致</p>
    <form method="post" class="mt-8 space-y-6" action="{{ url_for('login') }}">
      <div>
        <label class="mb-2 block text-[10px] font-semibold uppercase tracking-widest text-slate-400">用户名</label>
        <input
          name="username"
          autocomplete="username"
          required
          class="w-full rounded-xl border border-white/10 bg-black/30 px-4 py-3 text-sm text-white outline-none ring-amber-500/0 transition placeholder:text-slate-600 focus:border-amber-500/40 focus:ring-2 focus:ring-amber-500/30"
          placeholder="例如 zhangsan"
        >
      </div>
      <div>
        <span class="mb-2 block text-[10px] font-semibold uppercase tracking-widest text-slate-400">角色</span>
        <div class="grid grid-cols-2 gap-2 rounded-xl bg-black/35 p-1 ring-1 ring-white/10">
          <label class="cursor-pointer">
            <input type="radio" name="role" value="A" class="peer sr-only" required>
            <span class="block rounded-lg px-3 py-2.5 text-center text-sm text-slate-400 transition peer-checked:bg-amber-500/20 peer-checked:text-amber-200 peer-checked:ring-1 peer-checked:ring-amber-500/30">A 发放者</span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="role" value="B" class="peer sr-only">
            <span class="block rounded-lg px-3 py-2.5 text-center text-sm text-slate-400 transition peer-checked:bg-amber-500/20 peer-checked:text-amber-200 peer-checked:ring-1 peer-checked:ring-amber-500/30">B 受益人</span>
          </label>
        </div>
      </div>
      <button type="submit" class="w-full rounded-xl bg-amber-500 py-3 text-sm font-semibold text-desk-bg transition hover:bg-amber-400">进入工作台</button>
    </form>
    <p class="mt-6 text-center text-xs text-slate-500">
      尚无账户？
      <a href="{{ url_for('register') }}" class="font-medium text-amber-400/90 hover:text-amber-300">注册</a>
    </p>
  </div>
</div>
{% endblock %}
